name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: taskdb_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: "mysql://root:testpass@127.0.0.1:3306/taskdb_test"

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "mysql://root:testpass@127.0.0.1:3306/taskdb_test"

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: "mysql://root:testpass@127.0.0.1:3306/taskdb_test"
          PORT: 3000
          NODE_ENV: test
